apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-exporter


spec:

  replicas: 1


  selector:
    matchLabels:
      app: nginx-exporter


  template:

    metadata:

      labels:

        app: nginx-exporter


    spec:


      containers:


      - name: exporter

        image: nginx/nginx-prometheus-exporter

        args:
        - -nginx.scrape-uri=http://web-service:80/stub_status


        ports:

        - containerPort: 9114