# BLUE DEPLOYMENT

apiVersion: apps/v1
kind: Deployment

metadata:
  name: blue-deployment

spec:

  replicas: 2

  selector:
    matchLabels:
      app: web
      version: blue


  template:

    metadata:
      labels:
        app: web
        version: blue


    spec:

      containers:

      - name: nginx

        image: swapna171999/swapna-blue:v1

        ports:
        - containerPort: 80



---

# GREEN DEPLOYMENT


apiVersion: apps/v1
kind: Deployment

metadata:
  name: green-deployment


spec:

  replicas: 2


  selector:

    matchLabels:
      app: web
      version: green



  template:


    metadata:

      labels:
        app: web
        version: green



    spec:


      containers:


      - name: nginx

        image: swapna171999/swapna-green:v2


        ports:

        - containerPort: 80




---

# SERVICE

apiVersion: v1
kind: Service

metadata:

  name: web-service


spec:

  type: LoadBalancer


  selector:

    app: web

    


  ports:

  - port: 80

    targetPort: 80